<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabel Profesional</title>
  
  <style>
    /* Styling utama untuk tabel */
    .styled-table {
      width: 70%;
      border-collapse: collapse; /* Menghilangkan celah antar garis */
      margin: 15px 0;
      font-size: 0.9em;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-width: 400px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.15); /* Efek bayangan halus */
      border-radius: 8px 8px 0 0;
      overflow: hidden;
    }

    /* Styling untuk Header (Bagian Atas) */
    .styled-table thead tr {
      background-color: #009879; /* Warna hijau pro (bisa diganti sesuai tema) */
      color: #ffffff;
      text-align: left;
      font-weight: bold;
    }

    /* Padding (jarak dalam) untuk sel header dan data */
    .styled-table th,
    .styled-table td {
      padding: 5px 8px;
    }

    /* Garis tipis di setiap bawah baris data */
    .styled-table tbody tr {
      border-bottom: 1px solid #dddddd;
    }

    /* Warna selang-seling (Zebra striping) untuk baris genap */
    .styled-table tbody tr:nth-of-type(even) {
      background-color: #f3f3f3;
    }

    /* Garis penutup tebal di paling bawah tabel */
    .styled-table tbody tr:last-of-type {
      border-bottom: 2px solid #009879;
    }

    /* Efek interaktif saat baris disorot mouse */
    .styled-table tbody tr:hover {
      background-color: #f1f1f1;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <table class="styled-table">
    <thead>
      <tr>
        <th>No.</th>
        <th>Nama</th>
        <th>Tempat Tinggal</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>1.</td>
        <td>John</td>
        <td>London</td>
      </tr>
      <tr>
        <td>2.</td>
        <td>Siti</td>
        <td>Jakarta</td>
      </tr>
      <tr>
        <td>3.</td>
        <td>Michael</td>
        <td>Paris</td>
      </tr>
      <tr>
        <td>4.</td>
        <td>Budi</td>
        <td>Samarinda</td>
      </tr>
    </tbody>
  </table>

</body>
</html>
